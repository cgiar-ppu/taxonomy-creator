name: Deploy to AWS Amplify

on:
  push:
    branches: [master]
    paths-ignore:
      - "README.md"
      - "docs/**"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-central-1
  STACK_NAME: prms-taxonomy-amplify
  APP_NAME: prms-taxonomy

jobs:
  deploy:
    name: Deploy PRMS Taxonomy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy Amplify infrastructure (CloudFormation)
        run: |
          echo "=== Deploying Amplify app via CloudFormation ==="
          aws cloudformation deploy \
            --template-file infra/amplify-app.yaml \
            --stack-name ${{ env.STACK_NAME }} \
            --capabilities CAPABILITY_NAMED_IAM \
            --region ${{ env.AWS_REGION }} \
            --no-fail-on-empty-changeset \
            --tags \
              Project=${{ env.APP_NAME }} \
              ManagedBy=github-actions

          # Get the App ID from stack outputs
          APP_ID=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='AppId'].OutputValue" \
            --output text)
          echo "APP_ID=${APP_ID}" >> "$GITHUB_ENV"
          echo "Amplify App ID: ${APP_ID}"

      - name: Deploy static site to Amplify
        run: |
          echo "=== Deploying dist/ to Amplify ==="

          # Create a zip of the dist/ directory
          cd dist
          zip -r ../site.zip . -x ".*"
          cd ..

          # Create deployment
          DEPLOY_RESULT=$(aws amplify create-deployment \
            --app-id "${APP_ID}" \
            --branch-name master \
            --region ${{ env.AWS_REGION }})

          UPLOAD_URL=$(echo "$DEPLOY_RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin)['zipUploadUrl'])")
          JOB_ID=$(echo "$DEPLOY_RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin)['jobId'])")

          echo "Upload URL obtained, uploading site.zip..."
          curl -T site.zip "${UPLOAD_URL}" --silent --show-error

          # Start the deployment
          aws amplify start-deployment \
            --app-id "${APP_ID}" \
            --branch-name master \
            --job-id "${JOB_ID}" \
            --region ${{ env.AWS_REGION }}

          echo "Deployment started: job ${JOB_ID}"

          # Wait for deployment to complete
          echo "Waiting for deployment to complete..."
          for i in $(seq 1 30); do
            STATUS=$(aws amplify get-job \
              --app-id "${APP_ID}" \
              --branch-name master \
              --job-id "${JOB_ID}" \
              --region ${{ env.AWS_REGION }} \
              --query "job.summary.status" \
              --output text 2>/dev/null || echo "PENDING")

            echo "  Attempt ${i}/30: ${STATUS}"

            if [ "$STATUS" = "SUCCEED" ]; then
              echo "✅ Deployment succeeded!"
              break
            elif [ "$STATUS" = "FAILED" ] || [ "$STATUS" = "CANCELLED" ]; then
              echo "❌ Deployment failed with status: ${STATUS}"
              exit 1
            fi

            sleep 10
          done

          rm -f site.zip

      - name: Print deployment summary
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          DEFAULT_DOMAIN=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='DefaultDomain'].OutputValue" \
            --output text)
          CUSTOM_DOMAIN=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='CustomDomain'].OutputValue" \
            --output text)

          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| App ID | \`${APP_ID}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Default URL | ${DEFAULT_DOMAIN} |" >> $GITHUB_STEP_SUMMARY
          echo "| Custom URL | ${CUSTOM_DOMAIN} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | master |" >> $GITHUB_STEP_SUMMARY
          echo "| Region | ${{ env.AWS_REGION }} |" >> $GITHUB_STEP_SUMMARY
