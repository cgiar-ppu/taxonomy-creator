<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container { max-width: 480px; padding: 40px; }
        h1 { font-size: 72px; color: #00A651; margin: 0; }
        p { color: #8892a4; font-size: 16px; margin: 16px 0; }
        a {
            color: #00A651;
            text-decoration: none;
            font-weight: 600;
            border: 1px solid #00A651;
            padding: 10px 24px;
            border-radius: 6px;
            display: inline-block;
            margin-top: 16px;
            transition: all 0.15s;
        }
        a:hover { background: #00A651; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <p>The page you are looking for does not exist.</p>
        <a href="index.html">Back to Taxonomy Explorer</a>
    </div>
</body>
</html>
